<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>PennyMints — Icon Candidates</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1A2F35; color: #E0EDE8; font-family: -apple-system, sans-serif; padding: 40px; }
  h1 { text-align: center; font-size: 14px; text-transform: uppercase; letter-spacing: 5px; color: #4A7A6A; margin-bottom: 40px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 32px; max-width: 900px; margin: 0 auto; }
  .cell { text-align: center; }
  .cell img { width: 150px; height: 150px; border-radius: 34px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .cell .label { margin-top: 10px; font-size: 13px; color: #6A9A88; }
  .cell .num { font-size: 11px; color: #4A7A6A; }
</style>
</head><body>
<h1>PennyMints — App Icon Candidates</h1>
<div class="grid">
  <div class="cell"><img src="v01-big-coin.png"><div class="label">Big Coin</div><div class="num">V01</div></div>
  <div class="cell"><img src="v02-pm-on-mint.png"><div class="label">PM on Mint</div><div class="num">V02</div></div>
  <div class="cell"><img src="v03-coin-on-mint.png"><div class="label">Coin on Mint</div><div class="num">V03</div></div>
  <div class="cell"><img src="v04-mint-tin-pm.png"><div class="label">Mint Tin PM</div><div class="num">V04</div></div>
  <div class="cell"><img src="v05-gold-bg-pm.png"><div class="label">Gold BG PM</div><div class="num">V05</div></div>
  <div class="cell"><img src="v06-coin-pm.png"><div class="label">Coin PM</div><div class="num">V06</div></div>
  <div class="cell"><img src="v07-split-pm.png"><div class="label">Split P/M</div><div class="num">V07</div></div>
  <div class="cell"><img src="v08-cent-mint-circle.png"><div class="label">Cent Circle</div><div class="num">V08</div></div>
  <div class="cell"><img src="v09-stacked-coins.png"><div class="label">Stacked Coins</div><div class="num">V09</div></div>
  <div class="cell"><img src="v10-mint-bg-coin-pm.png"><div class="label">Mint Coin PM</div><div class="num">V10</div></div>
</div>
</body></html>
